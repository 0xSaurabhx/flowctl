[project]
site_name = "flowctl"
site_description = "Documentation for flowctl, an open-source workflow execution platform."
site_url = "https://flowctl.net/docs/"
repo_url = "https://github.com/cvhariharan/flowctl"
repo_name = "cvhariharan/flowctl"
edit_uri = "edit/master/docs/docs/docs/"
nav = [
  { "Home" = "index.md" },
  { "General" = [
    { "Flows" = "general/flows.md" },
    { "Flow Groups" = "general/flow-groups.md" },
    { "Nodes and Executors" = "general/nodes-and-executors.md" },
    { "Access Control" = "general/access-control.md" },
  ] },
  { "Development" = [
    { "Architecture" = "development/architecture.md" },
    { "Setup" = "development/setup.md" },
  ] },
  { "Advanced" = [
    { "Writing Executor Plugins" = "advanced/executor-plugins.md" },
    { "QSSH Setup" = "advanced/qssh-setup.md" },
  ] },
]

[project.theme]
language = "en"
logo = "assets/images/logo.svg"
favicon = "assets/images/logo.svg"
features = [
  "content.action.edit",
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.toc]
permalink = true
toc_depth = "2-3"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
