# ============================================================
# Components
# ============================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "fctl_pat_<random>"
      description: |
        User-scoped API token. Mint via `POST /api/v1/users/me/api-tokens` while
        logged in via the browser. Send as `Authorization: Bearer fctl_pat_...`.
    executorBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "fctl_<executor_name>.<signature>"
      description: |
        Executor token generated by the server for a running executor. Send as
        `Authorization: Bearer fctl_<executor_name>.<signature>`. Executors may
        also send `X-User-UUID` to associate requests with the triggering user.
    cookieAuth:
      type: apiKey
      in: cookie
      name: flowctl_session
      description: |
        Session cookie set by `POST /login` or the OIDC flow. Browser clients
        must also send `X-CSRF-Token` on state-changing requests.

  parameters:
    NamespacePath:
      name: namespace
      in: path
      required: true
      schema: { type: string }
      description: Namespace name (slug, not UUID).
    Filter:
      name: filter
      in: query
      required: false
      schema: { type: string }
      description: Substring filter applied server-side.
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 1 }
      description: 1-based page number; `0` means the first page.
    CountPerPage:
      name: count_per_page
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 10 }

  responses:
    BadRequest:
      description: Validation or input error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable message.
        code:
          type: string
          description: Stable machine code.
          enum:
            - VALIDATION_FAILED
            - REQUIRED_FIELD_MISSING
            - INVALID_INPUT
            - INVALID_PAGINATION
            - AUTHENTICATION_FAILED
            - INVALID_CREDENTIALS
            - UNAUTHORIZED
            - FORBIDDEN
            - RESOURCE_NOT_FOUND
            - OPERATION_FAILED
            - INTERNAL_ERROR
        details:
          description: Optional, code-specific payload.

    ArtifactMetadata:
      type: object
      required: [path, name, size, modified_at]
      properties:
        path: { type: string }
        name: { type: string }
        size: { type: integer, format: int64 }
        modified_at: { type: string, format: date-time }

    # Auth
    AuthReq:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
    SSOProvider:
      type: object
      properties:
        id: { type: string }
        label: { type: string }

    # Executor KV
    KVEntry:
      type: object
      required: [key, value]
      properties:
        key: { type: string }
        value: { type: string }

    # API tokens
    APIToken:
      type: object
      required: [uuid, label, created_at]
      properties:
        uuid: { type: string, format: uuid }
        label: { type: string }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    APITokenCreated:
      allOf:
        - $ref: "#/components/schemas/APIToken"
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: Raw `fctl_pat_*` token. Shown only on creation.

    # Users / groups
    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        name: { type: string }
        role: { type: string }
        groups:
          type: array
          items: { type: string, format: uuid }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        name: { type: string }
        login_type: { type: string, enum: [standard, oidc, token] }
        role: { type: string, enum: [user, superuser] }
    UserReq:
      type: object
      required: [name, username]
      properties:
        name: { type: string, minLength: 2, maxLength: 50 }
        username: { type: string, format: email }
        groups:
          type: array
          items: { type: string, format: uuid }
    UserWithGroups:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            groups:
              type: array
              items: { $ref: "#/components/schemas/Group" }
    UsersPaginateResponse:
      type: object
      properties:
        users:
          type: array
          items: { $ref: "#/components/schemas/UserWithGroups" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        users:
          type: array
          items: { $ref: "#/components/schemas/User" }
    GroupReq:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        description: { type: string, maxLength: 255 }
    GroupWithUsers:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            users:
              type: array
              items: { $ref: "#/components/schemas/User" }
    GroupsPaginateResponse:
      type: object
      properties:
        groups:
          type: array
          items: { $ref: "#/components/schemas/GroupWithUsers" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }

    # Namespaces
    NamespaceReq:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 150 }
    Namespace:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    NamespacesPaginateResponse:
      type: object
      properties:
        namespaces:
          type: array
          items: { $ref: "#/components/schemas/Namespace" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }
    NamespaceRole:
      type: string
      enum: [user, operator, reviewer, admin]
    NamespaceMemberReq:
      type: object
      required: [subject_id, subject_type, role]
      properties:
        subject_id: { type: string, format: uuid }
        subject_type: { type: string, enum: [user, group] }
        role: { $ref: "#/components/schemas/NamespaceRole" }
    NamespaceMemberResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject_id: { type: string, format: uuid }
        subject_name: { type: string }
        subject_type: { type: string, enum: [user, group] }
        role: { $ref: "#/components/schemas/NamespaceRole" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    NamespaceMembersResponse:
      type: object
      properties:
        members:
          type: array
          items: { $ref: "#/components/schemas/NamespaceMemberResp" }

    # Flows
    Schedule:
      type: object
      properties:
        cron: { type: string }
        timezone: { type: string }
    Notify:
      type: object
      required: [channel, config, events]
      properties:
        channel: { type: string, enum: [email, webhook] }
        config:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: string
            enum: [on_success, on_failure, on_waiting, on_cancelled]
    FlowMeta:
      type: object
      properties:
        id: { type: string }
        name: { type: string, minLength: 1, maxLength: 150 }
        description: { type: string, maxLength: 255 }
        prefix: { type: string, maxLength: 100 }
        schedules:
          type: array
          items: { $ref: "#/components/schemas/Schedule" }
        namespace: { type: string }
        allow_overlap: { type: boolean }
        user_schedulable: { type: boolean }
        max_retries: { type: integer, minimum: 0, maximum: 10 }
    FlowAction:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        executor: { type: string }
        approval: { type: boolean }
        on:
          type: array
          items: { type: string }
    FlowInput:
      type: object
      properties:
        name: { type: string }
        label: { type: string }
        description: { type: string }
        required: { type: boolean }
        type:
          type: string
          enum: [string, number, password, file, datetime, checkbox, select]
        options:
          type: array
          items: { type: string }
        default: { type: string }
        max_file_size:
          type: integer
          format: int64
    FlowInputsResp:
      type: object
      properties:
        inputs:
          type: array
          items: { $ref: "#/components/schemas/FlowInput" }
        options_request_id: { type: string }
    FlowMetaResp:
      type: object
      properties:
        meta: { $ref: "#/components/schemas/FlowMeta" }
        actions:
          type: array
          items: { $ref: "#/components/schemas/FlowAction" }
        scheduled_executions:
          type: array
          items:
            type: object
            properties:
              exec_id: { type: string, format: uuid }
              scheduled_at: { type: string, format: date-time }
    FlowListItem:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        prefix: { type: string }
        schedules:
          type: array
          items: { $ref: "#/components/schemas/Schedule" }
        step_count: { type: integer }
    FlowListResponse:
      type: object
      properties:
        flows:
          type: array
          items: { $ref: "#/components/schemas/FlowListItem" }
    FlowsPaginateResponse:
      type: object
      properties:
        flows:
          type: array
          items: { $ref: "#/components/schemas/FlowListItem" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }
    FlowInputReq:
      type: object
      required: [name, type]
      properties:
        name: { type: string, minLength: 1, maxLength: 150 }
        type:
          type: string
          enum: [string, number, password, file, datetime, checkbox, select]
        label: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 255 }
        validation: { type: string }
        required: { type: boolean }
        default: { type: string }
        options:
          type: array
          items: { type: string }
        max_file_size: { type: integer, format: int64 }
        remote_options:
          type: object
          required: [url]
          properties:
            url: { type: string, format: uri }
            method: { type: string, enum: [GET, POST] }
            headers:
              type: object
              additionalProperties: { type: string }
    FlowActionReq:
      type: object
      required: [name, with]
      properties:
        name: { type: string, minLength: 1, maxLength: 150 }
        executor: { type: string }
        with:
          type: object
          additionalProperties: true
        approval: { type: boolean }
        variables:
          type: array
          items:
            type: object
            additionalProperties: true
        condition: { type: string }
        on:
          type: array
          items: { type: string }
    FlowCreateReq:
      type: object
      required: [metadata, inputs, actions]
      properties:
        metadata: { $ref: "#/components/schemas/FlowMeta" }
        inputs:
          type: array
          items: { $ref: "#/components/schemas/FlowInputReq" }
        actions:
          type: array
          items: { $ref: "#/components/schemas/FlowActionReq" }
        notify:
          type: array
          items: { $ref: "#/components/schemas/Notify" }
    FlowCreateResp:
      type: object
      properties:
        id: { type: string }
    FlowUpdateReq:
      type: object
      required: [inputs, actions]
      properties:
        prefix: { type: string, maxLength: 100 }
        schedules:
          type: array
          items: { $ref: "#/components/schemas/Schedule" }
        notify:
          type: array
          items: { $ref: "#/components/schemas/Notify" }
        allow_overlap: { type: boolean }
        user_schedulable: { type: boolean }
        max_retries: { type: integer, minimum: 0, maximum: 10 }
        description: { type: string, maxLength: 255 }
        inputs:
          type: array
          items: { $ref: "#/components/schemas/FlowInputReq" }
        actions:
          type: array
          items: { $ref: "#/components/schemas/FlowActionReq" }
    FlowTriggerResp:
      type: object
      properties:
        exec_id: { type: string, format: uuid }
        scheduled_at: { type: string, format: date-time, nullable: true }
    FlowCancellationResp:
      type: object
      properties:
        message: { type: string }
        execID: { type: string, format: uuid }

    # Flow groups
    FlowGroupReq:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 500 }
    FlowGroupResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        prefix: { type: string }
        description: { type: string }
        flow_count: { type: integer, format: int64 }
    FlowGroupsResponse:
      type: object
      properties:
        groups:
          type: array
          items: { $ref: "#/components/schemas/FlowGroupResp" }
    FlowGroupDetailResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }

    # Executions
    ExecutionStatus:
      type: string
      enum: [pending, pending_approval, running, completed, errored, cancelled]
    ExecutionSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        flow_name: { type: string }
        flow_id: { type: string }
        status: { $ref: "#/components/schemas/ExecutionStatus" }
        trigger_type: { type: string, enum: [manual, scheduled] }
        input: { description: Original trigger inputs. }
        triggered_by: { type: string }
        current_action_id: { type: string }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        scheduled_at: { type: string, format: date-time, nullable: true }
        action_retries:
          type: object
          additionalProperties: { type: integer }
    ExecutionsPaginateResponse:
      type: object
      properties:
        executions:
          type: array
          items: { $ref: "#/components/schemas/ExecutionSummary" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }

    # Secrets
    FlowSecretReq:
      type: object
      required: [key, value]
      properties:
        key: { type: string, minLength: 1, maxLength: 150 }
        value: { type: string }
        description: { type: string, maxLength: 255 }
    FlowSecretUpdateReq:
      type: object
      required: [value]
      properties:
        value: { type: string }
        description: { type: string, maxLength: 255 }
    FlowSecretResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    NamespaceSecretReq:
      type: object
      required: [key, value]
      properties:
        key: { type: string, minLength: 1, maxLength: 150 }
        value: { type: string }
        description: { type: string, maxLength: 255 }
    NamespaceSecretUpdateReq:
      type: object
      required: [value]
      properties:
        value: { type: string }
        description: { type: string, maxLength: 255 }
    NamespaceSecretResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # Schedules
    ScheduleCreateReq:
      type: object
      required: [cron, timezone, inputs]
      properties:
        cron: { type: string, description: Standard cron expression. }
        timezone: { type: string, description: IANA timezone name. }
        inputs:
          type: object
          additionalProperties: true
    ScheduleUpdateReq:
      type: object
      required: [cron, timezone, inputs]
      properties:
        cron: { type: string }
        timezone: { type: string }
        inputs:
          type: object
          additionalProperties: true
        is_active: { type: boolean }
    ScheduleResp:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        flow_slug: { type: string }
        flow_name: { type: string }
        cron: { type: string }
        timezone: { type: string }
        inputs:
          type: object
          additionalProperties: true
        created_by: { type: string }
        is_active: { type: boolean }
        is_user_created: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SchedulesPaginateResponse:
      type: object
      properties:
        schedules:
          type: array
          items: { $ref: "#/components/schemas/ScheduleResp" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }

    # Nodes
    NodeAuth:
      type: object
      required: [method, credential_id]
      properties:
        method: { type: string, enum: [private_key, password] }
        credential_id: { type: string, format: uuid }
    NodeReq:
      type: object
      required: [name, hostname, port, username, connection_type, auth]
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        hostname: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username: { type: string, minLength: 2, maxLength: 50 }
        connection_type: { type: string, enum: [ssh, qssh] }
        tags:
          type: array
          items: { type: string }
        auth: { $ref: "#/components/schemas/NodeAuth" }
    NodeResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        hostname: { type: string }
        port: { type: integer }
        username: { type: string }
        os_family: { type: string }
        connection_type: { type: string, enum: [ssh, qssh] }
        tags:
          type: array
          items: { type: string }
        auth: { $ref: "#/components/schemas/NodeAuth" }
    NodesPaginateResponse:
      type: object
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/NodeResp" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }
    NodeStatsResp:
      type: object
      properties:
        total_hosts: { type: integer, format: int64 }
        ssh_hosts: { type: integer, format: int64 }
        qssh_hosts: { type: integer, format: int64 }

    # Credentials
    CredentialReq:
      type: object
      required: [name, key_type, key_data]
      properties:
        name: { type: string, minLength: 2, maxLength: 255 }
        key_type: { type: string, enum: [private_key, password] }
        key_data:
          type: string
          description: Plaintext on the wire; stored encrypted at rest.
    CredentialResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key_type: { type: string, enum: [private_key, password] }
        last_accessed: { type: string, format: date-time }
    CredentialsPaginateResponse:
      type: object
      properties:
        credentials:
          type: array
          items: { $ref: "#/components/schemas/CredentialResp" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }

    # Approvals
    ApprovalResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        action_id: { type: string }
        flow_name: { type: string }
        status: { type: string, enum: [pending, approved, rejected] }
        exec_id: { type: string, format: uuid }
        requested_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ApprovalDetailsResp:
      allOf:
        - $ref: "#/components/schemas/ApprovalResp"
        - type: object
          properties:
            flow_id: { type: string }
            approved_by: { type: string }
            inputs:
              description: Original trigger inputs (JSON).
    ApprovalActionResp:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [approved, rejected] }
        messages: { type: string }
    ApprovalsPaginateResponse:
      type: object
      properties:
        approvals:
          type: array
          items: { $ref: "#/components/schemas/ApprovalResp" }
        page_count: { type: integer, format: int64 }
        total_count: { type: integer, format: int64 }

    # Meta
    ExecutorInfo:
      type: object
      properties:
        name: { type: string }
        capabilities:
          type: array
          items: { type: string }
    ExecutorsListResponse:
      type: object
      properties:
        executors:
          type: array
          items: { $ref: "#/components/schemas/ExecutorInfo" }
