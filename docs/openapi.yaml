openapi: 3.0.3
info:
  title: flowctl HTTP API
  version: "1"
  description: |
    HTTP API for [flowctl](https://github.com/cvhariharan/flowctl), a single-binary
    self-service workflow platform.

    ## Authentication

    Two mechanisms are supported. **Browser clients** authenticate via session
    cookies (`POST /login` or the OIDC flow) and must include the `X-CSRF-Token`
    header on every state-changing request. **Programmatic clients** authenticate
    via user-scoped API tokens minted in the web UI and sent in the
    `Authorization: Bearer <token>` header (token prefix `fctl_pat_`). Bearer
    requests are exempt from CSRF.

    API-token requests **cannot** create or revoke API tokens themselves, those
    endpoints require a session.

    ## Conventions

    - All resource IDs are UUIDs.
    - Timestamps are RFC 3339 (`2025-06-04T10:00:00Z`).
    - Errors use a uniform JSON envelope (see `Error` schema).
    - Pagination endpoints return `page_count` and `total_count` next to the page slice.

servers:
  - url: https://flowctl.example.com
    description: Production server (replace with your deployment URL)
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: Auth
    description: Login, logout, and SSO. Browser-only — not callable with API tokens.
  - name: API Tokens
    description: Manage personal access tokens. Session auth only.
  - name: Users
    description: User CRUD and profile.
  - name: Groups
    description: User groups.
  - name: Namespaces
    description: Top-level workspace containers.
  - name: Namespace Members
    description: Add/remove users and groups in a namespace and grant prefix access.
  - name: Flows
    description: Workflow definitions, triggers, executions and logs.
  - name: Flow Groups
    description: Prefix-based grouping of flows.
  - name: Flow Secrets
    description: Per-flow secrets.
  - name: Namespace Secrets
    description: Namespace-scoped secrets.
  - name: Schedules
    description: Cron schedules attached to flows.
  - name: Nodes
    description: Remote target hosts.
  - name: Credentials
    description: SSH / password credentials referenced by nodes.
  - name: Approvals
    description: Approval requests raised by flows with the approval gate.
  - name: Permissions
    description: Casbin permission inspection.
  - name: Executor KV
    description: Executor-only key/value storage used by running executors.
  - name: Meta
    description: Service metadata, executors, messengers.

paths:
  # ---------------- Auth ----------------
  /ping:
    get:
      operationId: Ping
      tags: [Meta]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /login:
    post:
      operationId: Login
      tags: [Auth]
      summary: Password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthReq"
      responses:
        "200":
          description: Session cookie set; `x-redirect` response header indicates the destination.
          headers:
            x-redirect:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /logout:
    post:
      operationId: Logout
      tags: [Auth]
      summary: Destroy the current session
      responses:
        "200":
          description: Logged out

  /sso-providers:
    get:
      operationId: ListSSOProviders
      tags: [Auth]
      summary: List configured OIDC providers
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SSOProvider"

  /login/oidc/{provider}:
    get:
      operationId: StartOIDCLogin
      tags: [Auth]
      summary: Begin an OIDC login flow (browser-only redirect)
      security: []
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string } }
        - { name: redirect_url, in: query, required: false, schema: { type: string } }
      responses:
        "302":
          description: Redirect to provider

  /auth/callback:
    get:
      operationId: CompleteOIDCLogin
      tags: [Auth]
      summary: OIDC callback (browser-only)
      security: []
      responses:
        "302":
          description: Redirect to app

  # ---------------- API Tokens ----------------
  /api/v1/users/me/api-tokens:
    get:
      operationId: ListAPITokens
      tags: [API Tokens]
      summary: List the calling user's API tokens
      description: Session-only. PAT-authenticated requests get `403`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/APIToken" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: CreateAPIToken
      tags: [API Tokens]
      summary: Create a new API token
      description: |
        Returns the raw token **once**. Store it now — only the hash is kept
        server-side, so it cannot be retrieved later. Session-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  maxLength: 150
                  example: ci-pipeline
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APITokenCreated" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/users/me/api-tokens/{tokenID}:
    delete:
      operationId: RevokeAPIToken
      tags: [API Tokens]
      summary: Revoke an API token
      description: Session-only. Idempotent.
      parameters:
        - { name: tokenID, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ---------------- Users ----------------
  /api/v1/users:
    get:
      operationId: ListUsers
      tags: [Users]
      summary: Paginated user list (namespace admins or superusers)
      parameters:
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/CountPerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsersPaginateResponse" }
    post:
      operationId: CreateUser
      tags: [Users]
      summary: Create a user (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserReq" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserWithGroups" }

  /api/v1/users/profile:
    get:
      operationId: GetCurrentUserProfile
      tags: [Users]
      summary: Get the calling user's profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }

  /api/v1/users/{userID}:
    parameters:
      - { name: userID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: GetUser
      tags: [Users]
      summary: Get a user by UUID (superuser only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserWithGroups" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: UpdateUser
      tags: [Users]
      summary: Update a user (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserReq" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserWithGroups" }
    delete:
      operationId: DeleteUser
      tags: [Users]
      summary: Delete a user (superuser only)
      responses:
        "200": { description: Deleted }

  # ---------------- Groups ----------------
  /api/v1/groups:
    get:
      operationId: ListGroups
      tags: [Groups]
      summary: Paginated group list (namespace admins or superusers)
      parameters:
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/CountPerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupsPaginateResponse" }
    post:
      operationId: CreateGroup
      tags: [Groups]
      summary: Create a group (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupReq" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupWithUsers" }

  /api/v1/groups/{groupID}:
    parameters:
      - { name: groupID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: GetGroup
      tags: [Groups]
      summary: Get a group (superuser only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupWithUsers" }
    put:
      operationId: UpdateGroup
      tags: [Groups]
      summary: Update a group (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupReq" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GroupWithUsers" }
    delete:
      operationId: DeleteGroup
      tags: [Groups]
      summary: Delete a group (superuser only)
      responses:
        "200": { description: Deleted }

  # ---------------- Namespaces ----------------
  /api/v1/namespaces:
    get:
      operationId: ListNamespaces
      tags: [Namespaces]
      summary: List namespaces the calling user can see
      parameters:
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/CountPerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NamespacesPaginateResponse" }
    post:
      operationId: CreateNamespace
      tags: [Namespaces]
      summary: Create a namespace (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NamespaceReq" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Namespace" }

  /api/v1/namespaces/{namespaceID}:
    parameters:
      - { name: namespaceID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: GetNamespace
      tags: [Namespaces]
      summary: Get a namespace (superuser only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Namespace" }
    put:
      operationId: UpdateNamespace
      tags: [Namespaces]
      summary: Update a namespace (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NamespaceReq" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Namespace" }
    delete:
      operationId: DeleteNamespace
      tags: [Namespaces]
      summary: Delete a namespace (superuser only)
      responses:
        "200": { description: Deleted }

  # ---------------- Namespace Members ----------------
  /api/v1/{namespace}/members:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
    get:
      operationId: ListNamespaceMembers
      tags: [Namespace Members]
      summary: List namespace members
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NamespaceMembersResponse" }
    post:
      operationId: AddNamespaceMember
      tags: [Namespace Members]
      summary: Add a user or group as a namespace member
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NamespaceMemberReq" }
      responses:
        "200": { description: Added }

  /api/v1/{namespace}/members/{membershipID}:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: membershipID, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      operationId: UpdateNamespaceMemberRole
      tags: [Namespace Members]
      summary: Change a member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { $ref: "#/components/schemas/NamespaceRole" }
      responses:
        "200": { description: Updated }
    delete:
      operationId: RemoveNamespaceMember
      tags: [Namespace Members]
      summary: Remove a member from the namespace
      responses:
        "200": { description: Removed }

  /api/v1/{namespace}/members/{membershipID}/groups:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: membershipID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: ListMemberFlowGroups
      tags: [Namespace Members]
      summary: List flow-group prefixes a member has access to
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowGroupsResponse" }
    post:
      operationId: GrantMemberFlowGroupAccess
      tags: [Namespace Members]
      summary: Grant access to a flow-group prefix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prefix]
              properties:
                prefix: { type: string, maxLength: 100 }
      responses:
        "200": { description: Granted }

  /api/v1/{namespace}/members/{membershipID}/groups/{group}:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: membershipID, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: group, in: path, required: true, schema: { type: string } }
    delete:
      operationId: RevokeMemberFlowGroupAccess
      tags: [Namespace Members]
      summary: Revoke access to a flow-group prefix
      responses:
        "200": { description: Revoked }

  # ---------------- Flows ----------------
  /api/v1/{namespace}/flows:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
    get:
      operationId: ListFlows
      tags: [Flows]
      summary: Paginated flow list
      parameters:
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/CountPerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowsPaginateResponse" }
    post:
      operationId: CreateFlow
      tags: [Flows]
      summary: Create a flow
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlowCreateReq" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowCreateResp" }

  /api/v1/{namespace}/flows/{flowID}:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: flowID, in: path, required: true, schema: { type: string } }
    get:
      operationId: GetFlow
      tags: [Flows]
      summary: Get a flow's metadata
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowMeta" }
    put:
      operationId: UpdateFlow
      tags: [Flows]
      summary: Update a flow
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlowUpdateReq" }
      responses:
        "200": { description: Updated }
    delete:
      operationId: DeleteFlow
      tags: [Flows]
      summary: Delete a flow
      responses:
        "200": { description: Deleted }

  /api/v1/{namespace}/flows/{flowID}/meta:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: flowID, in: path, required: true, schema: { type: string } }
    get:
      operationId: GetFlowDetails
      tags: [Flows]
      summary: Get flow metadata + actions + scheduled executions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowMetaResp" }

  /api/v1/{namespace}/flows/{flowID}/inputs:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: flowID, in: path, required: true, schema: { type: string } }
    get:
      operationId: GetFlowInputs
      tags: [Flows]
      summary: Get a flow's declared inputs (form schema)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowInputsResp" }

  /api/v1/{namespace}/flows/{flowID}/config:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: flowID, in: path, required: true, schema: { type: string } }
    get:
      operationId: GetFlowConfig
      tags: [Flows]
      summary: Get a flow's full configuration (requires ViewConfig permission)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/{namespace}/trigger/{flow}:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: flow, in: path, required: true, schema: { type: string } }
      - name: scheduled_at
        in: query
        required: false
        schema: { type: string, format: date-time }
        description: RFC3339; if set, schedule the run for that time instead of running immediately.
    post:
      operationId: TriggerFlow
      tags: [Flows]
      summary: Trigger a flow run
      description: |
        Accepts the flow's declared inputs as either JSON or `multipart/form-data`
        (required when the flow declares any `file`-typed inputs). Field names
        match the input `name`s from `GET /flows/{flowID}/inputs`.

        Send the `X-Options-Request-ID` header when re-using cached remote-option
        responses to avoid re-fetching them.
      parameters:
        - name: X-Options-Request-ID
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          multipart/form-data:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowTriggerResp" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------------- Executions / logs ----------------
  /api/v1/{namespace}/flows/executions:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
    get:
      operationId: ListExecutions
      tags: [Flows]
      summary: Paginated executions across all flows in a namespace
      parameters:
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/CountPerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutionsPaginateResponse" }

  /api/v1/{namespace}/flows/executions/{execID}:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: execID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: GetExecution
      tags: [Flows]
      summary: Get an execution summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutionSummary" }

  /api/v1/{namespace}/flows/executions/{execID}/cancel:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: execID, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: CancelExecution
      tags: [Flows]
      summary: Cancel a running or scheduled execution
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowCancellationResp" }

  /api/v1/{namespace}/flows/executions/{execID}/retry:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: execID, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: RetryExecution
      tags: [Flows]
      summary: Retry an execution (re-queue with the same inputs)
      responses:
        "200":
          description: Queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowTriggerResp" }

  /api/v1/{namespace}/flows/executions/{execID}/artifacts:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: execID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: ListExecutionArtifacts
      tags: [Flows]
      summary: List/browse artifacts for an execution
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactMetadata"

  /api/v1/{namespace}/flows/executions/{execID}/artifacts/download:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: execID, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: path, in: query, required: true, schema: { type: string } }
    get:
      operationId: DownloadExecutionArtifact
      tags: [Flows]
      summary: Download an artifact file
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/v1/{namespace}/flows/{flowID}/executions:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: flowID, in: path, required: true, schema: { type: string } }
    get:
      operationId: ListFlowExecutions
      tags: [Flows]
      summary: Paginated executions for a specific flow
      parameters:
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/CountPerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExecutionsPaginateResponse" }

  /api/v1/{namespace}/logs/{logID}:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: logID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: StreamExecutionLogs
      tags: [Flows]
      summary: Stream live execution logs (Server-Sent Events / chunked stream)
      responses:
        "200":
          description: A long-lived response that streams log lines as they arrive.
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/{namespace}/logs/{logID}/download:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
      - { name: logID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: DownloadExecutionLog
      tags: [Flows]
      summary: Download a completed execution's full log
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string }

  # ---------------- Flow groups ----------------
  /api/v1/{namespace}/flows/groups:
    parameters:
      - $ref: "#/components/parameters/NamespacePath"
    get:
      operationId: ListFlowGroups
      tags: [Flow Groups]
      summary: List all flow groups in a namespace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowGroupsResponse" }
    post:
      operationId: CreateFlowGroup
      tags: [Flow Groups]
      summary: Create a flow group (prefix)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlowGroupReq" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowGroupDetailResp" }

  /api/v1/{namespace}/flows/groups/me:
    parameters:
